{% set name = "bw_processing" %}
{% set version = "1.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/bw_processing-{{ version }}.tar.gz
  sha256: 14b0ff7c5326d2a318e4320e79125cca3bdbdf66d0f5296f41bbbbb0ce3c6430

build:
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv
  number: 0

requirements:
  host:
    - python {{ python_min }}
    - setuptools >=68.0
    - pip
  run:
    - python >={{ python_min }}
    - fsspec
    - morefs
    - numpy
    - pandas

test:
  imports:
    - bw_processing
  commands:
    - pip check
  requires:
    - pip
    - python {{ python_min }}

about:
  home: https://github.com/brightway-lca/bw_processing
  summary: Tools to create structured arrays in a common format
  license: BSD-3-Clause
  license_family: BSD
  license_file:
    - LICENSE
  doc_url: https://3.docs.brightwaylca.org/
  dev_url: https://github.com/brightway-lca/bw_processing

extra:
  recipe-maintainers:
    - cmutel
    - xylar
